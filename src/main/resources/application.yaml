spring:
  application:
    name: team8-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

management:
  endpoints:
    web:
      base-path: /api/v1
  endpoint:
    health:
      enabled: true

# 수강신청 기간 설정
enrollment-period:
  type: REGULAR  # REGULAR(재학생) / FRESHMAN(신입생)

# 수강신청 연습 설정
practice:
  session:
    default-start-time-option: TIME_08_29_30
    target-time: "08:30:00"
    time-limit-seconds: 300
    early-click-recording-window-ms: 1000
    lock-ttl-seconds: 10

course:
  import:
    batch-size: 500

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
    admin-key: ${KAKAO_ADMIN_KEY:}
    unlink-uri: https://kapi.kakao.com/v1/user/unlink
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    token-uri: https://oauth2.googleapis.com/token
    revoke-uri: https://oauth2.googleapis.com/revoke
    issuer: https://accounts.google.com
    jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs
