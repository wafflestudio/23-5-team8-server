name: Deploy-prod

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    uses: ./.github/workflows/_deploy.yml
    with:
      ocir_repository: snuclear-prod/snuclear-server
      dockerfile: Dockerfile
      namespace: default
      deployment_name: snuclear-server
      container_name: snuclear-server
    secrets:
      OCI_AUTH_TOKEN: ${{ secrets.OCI_AUTH_TOKEN }}
      KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
