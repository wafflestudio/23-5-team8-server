name: deploy-template

on:
  workflow_call:
    inputs:
      ocir_repository:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
        description: "Dockerfile path (e.g., Dockerfile)"
      namespace:
        required: true
        type: string
      deployment_name:
        required: true
        type: string
      container_name:
        required: false
        type: string
        description: "Optional - auto-detected from deployment if not provided"
    secrets:
      OCI_AUTH_TOKEN:
        required: true
      KUBE_CONFIG_DATA:
        required: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-24.04-arm

    env:
      IMAGE_TAG: ${{ github.run_number }}
      OCIR_REGISTRY: yny.ocir.io
      OCIR_NAMESPACE: ax1dvc8vmenm
      OCIR_REPOSITORY: ${{ inputs.ocir_repository }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Build Jar
        run: ./gradlew bootJar

      - name: Login to OCIR
        run: echo "${{ secrets.OCI_AUTH_TOKEN }}" | docker login $OCIR_REGISTRY -u ax1dvc8vmenm/members/waffle-deployer --password-stdin

      - name: Docker build, tag, and push image to OCIR
        id: build-push-image
        run: |
          docker build \
            -f ${{ inputs.dockerfile }} \
            -t $OCIR_REGISTRY/$OCIR_NAMESPACE/$OCIR_REPOSITORY:$IMAGE_TAG \
            . \
            --platform linux/arm64
          docker push $OCIR_REGISTRY/$OCIR_NAMESPACE/$OCIR_REPOSITORY:$IMAGE_TAG
          echo "image=$OCIR_REGISTRY/$OCIR_NAMESPACE/$OCIR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Cancel stuck rollout
        run: |
          kubectl -n ${{ inputs.namespace }} rollout undo deployment/${{ inputs.deployment_name }} 2>/dev/null || true
          kubectl -n ${{ inputs.namespace }} rollout status deployment/${{ inputs.deployment_name }} --timeout=60s 2>/dev/null || true

      - name: Update deployment image
        run: |
          CONTAINER=$(kubectl -n ${{ inputs.namespace }} get deployment/${{ inputs.deployment_name }} -o jsonpath='{.spec.template.spec.containers[0].name}')
          echo "Container: $CONTAINER, Image: $OCIR_REGISTRY/$OCIR_NAMESPACE/$OCIR_REPOSITORY:$IMAGE_TAG"
          kubectl -n ${{ inputs.namespace }} set image \
            deployment/${{ inputs.deployment_name }} \
            $CONTAINER=$OCIR_REGISTRY/$OCIR_NAMESPACE/$OCIR_REPOSITORY:$IMAGE_TAG

      - name: Wait for rollout
        run: |
          kubectl -n ${{ inputs.namespace }} rollout status deployment/${{ inputs.deployment_name }} --timeout=300s
